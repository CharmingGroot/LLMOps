name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/llmops

jobs:
  publish:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHA" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push API image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          docker build --target api -t $IMAGE:latest -t $IMAGE:${{ steps.tags.outputs.sha_tag }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ steps.tags.outputs.sha_tag }}
          if [ -n "${{ steps.tags.outputs.version_tag }}" ]; then
            docker tag $IMAGE:latest $IMAGE:${{ steps.tags.outputs.version_tag }}
            docker push $IMAGE:${{ steps.tags.outputs.version_tag }}
          fi

      - name: Build & push Dashboard UI image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard-ui
          docker build --target dashboard-ui -t $IMAGE:latest -t $IMAGE:${{ steps.tags.outputs.sha_tag }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ steps.tags.outputs.sha_tag }}
          if [ -n "${{ steps.tags.outputs.version_tag }}" ]; then
            docker tag $IMAGE:latest $IMAGE:${{ steps.tags.outputs.version_tag }}
            docker push $IMAGE:${{ steps.tags.outputs.version_tag }}
          fi

      - name: Build & push CLI image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-cli
          docker build --target cli -t $IMAGE:latest -t $IMAGE:${{ steps.tags.outputs.sha_tag }} .
          docker push $IMAGE:latest
          docker push $IMAGE:${{ steps.tags.outputs.sha_tag }}
          if [ -n "${{ steps.tags.outputs.version_tag }}" ]; then
            docker tag $IMAGE:latest $IMAGE:${{ steps.tags.outputs.version_tag }}
            docker push $IMAGE:${{ steps.tags.outputs.version_tag }}
          fi
