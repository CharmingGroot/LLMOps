name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Type check
        run: pnpm typecheck

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python modules
        run: ruff check modules/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t llmops-api .

      - name: Build CLI image
        run: docker build --target cli -t llmops-cli .

      - name: Build Dashboard UI image
        run: docker build --target dashboard-ui -t llmops-dashboard-ui .
